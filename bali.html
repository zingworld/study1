    { date:"2026-07-11", dow:"토", items:[
      {time:"08:00", title:"조식"},
      {time:"09:00", title:"꾸따 출발", desc:"오토바이 약하면 50분 넘게 걸림 (보통 35분~40분)"},
      {time:"10:00", title:"꾸따 서핑", desc:"현금 필요"},
      {time:"12:00", title:"대충 씻고 꾸따 구경"},
      {time:"", title:"꾸따 할 일", desc:"점심 먹고 시내 간단히 보고 넘어오기"}
    ]},
    { date:"2026-07-12", dow:"일", items:[
      {time:"12:00", title:"체크아웃", desc:"짐 맡기기"},
      {time:"12:30", title:"와룽 시사", move:"도보", desc:"나시쫌뿌르 점심"},
      {time:"15:00", title:"라 브리사", move:"도보"},
      {time:"20:00", title:"공항 샌딩", move:"업체 차량", desc:"호텔에서 짐 찾고 샌딩 업체 기다리기"},
      {time:"22:00", title:"공항 도착"}
    ]},
    { date:"2026-07-13", dow:"월", items:[
      {time:"00:15", title:"비행기 탑승"},
      {time:"08:35", title:"청주 공항 도착"},
      {time:"11:00", title:"집 도착 ㅠㅠ"}
    ]}
  ];

  var STORE_KEY = "bali2026-trip-state-v1";
  var state = loadState();

  function loadState(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { notes:{}, expenses:{} };
  }
  function saveState(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function escapeHtml(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }
  function fmtNum(n){ return Number(n||0).toLocaleString("ko-KR"); }
  function todayIso(){
    var d = new Date();
    var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
    return y+"-"+m+"-"+day;
  }
  function shortDate(iso){ return iso.slice(5).replace("-","."); }

  var today = todayIso();

  // ---------- render day chips ----------
  var chipsEl = document.getElementById("dayChips");
  chipsEl.innerHTML = TRIP.map(function(day, di){
    var isToday = day.date === today;
    return '<button class="chip'+(isToday?' today':'')+'" data-day="'+di+'">'+
      '<span class="d mono">'+shortDate(day.date)+'</span><span class="w">'+day.dow+'</span></button>';
  }).join("");

  // ---------- render schedule ----------
  var scheduleEl = document.getElementById("scheduleView");

  function itemHtml(it, id){
    var parts = [];
    parts.push('<div class="item" id="'+id+'">');
    parts.push('<div class="item-time mono">'+escapeHtml(it.time||"")+'</div>');
    parts.push('<div class="item-body">');
    parts.push('<div class="item-head"><h3>'+escapeHtml(it.title)+(it.flight?'<span class="flight">'+escapeHtml(it.flight)+'</span>':'')+'</h3>'+(it.move?'<span class="badge">'+escapeHtml(it.move)+'</span>':'')+'</div>');
    if(it.tag) parts.push('<div><span class="badge tag">'+escapeHtml(it.tag)+'</span></div>');
    if(it.desc) parts.push('<p class="desc'+(it.highlight?' highlight':'')+'">'+escapeHtml(it.desc)+'</p>');
    if(it.warn) parts.push('<div class="warn">⚠ '+escapeHtml(it.warn)+'</div>');
    if(it.link) parts.push('<div class="link-row"><a href="'+escapeHtml(it.link.url)+'" target="_blank" rel="noopener">'+escapeHtml(it.link.label)+' ↗</a></div>');
    parts.push('<div class="extras">');
    parts.push(
      '<details class="box" data-kind="note">'+
        '<summary>내 메모 <span class="sum-val" data-note-count="'+id+'">0</span></summary>'+
        '<div class="box-inner">'+
          '<ul class="mini-list" data-note-list="'+id+'"></ul>'+
          '<form class="mini-form" data-note-form="'+id+'">'+
            '<input type="text" class="n-time" placeholder="시간 (선택, 예: 13:20)">'+
            '<input type="text" class="n-text" placeholder="메모 내용" required>'+
            '<input type="url" class="n-url" placeholder="링크 (선택)">'+
            '<button type="submit" class="submit">메모 추가</button>'+
          '</form>'+
        '</div>'+
      '</details>'
    );
    parts.push(
      '<details class="box" data-kind="expense">'+
        '<summary>지출 <span class="sum-val" data-exp-sum="'+id+'">-</span></summary>'+
        '<div class="box-inner">'+
          '<ul class="mini-list" data-exp-list="'+id+'"></ul>'+
          '<form class="mini-form" data-exp-form="'+id+'">'+
            '<div class="seg" data-field="method">'+
              '<button type="button" class="active" data-value="현금">현금</button>'+
              '<button type="button" data-value="카드">카드</button>'+
            '</div>'+
            '<div class="seg" data-field="card" hidden>'+
              '<button type="button" class="active" data-value="교카드">교카드</button>'+
              '<button type="button" data-value="징카드">징카드</button>'+
            '</div>'+
            '<div class="amt-row">'+
              '<input type="number" inputmode="decimal" class="e-amount" placeholder="금액" required min="0">'+
              '<select class="e-currency"><option value="IDR">Rp</option><option value="KRW">원</option></select>'+
            '</div>'+
            '<input type="text" class="e-memo" placeholder="메모 (선택, 예: 점심값)">'+
            '<button type="submit" class="submit">지출 추가</button>'+
          '</form>'+
        '</div>'+
      '</details>'
    );
    parts.push('</div></div></div>');
    return parts.join("");
  }

  var dayHtml = TRIP.map(function(day, di){
    var isToday = day.date === today;
    var h = '<section class="day'+(isToday?' open':'')+'" id="day-'+di+'" data-day="'+di+'">';
    h += '<button class="day-head" data-toggle="'+di+'"><span class="label"><span class="date">'+shortDate(day.date)+' ('+day.dow+')</span><span class="count">'+day.items.length+'개 일정</span></span><span class="chev">⌄</span></button>';
    h += '<div class="day-body"><div class="timeline">';
    if(day.tip){
      h += '<div class="tip-card"><div class="tip-title">'+escapeHtml(day.tip.title)+'</div><ul>'+day.tip.items.map(function(x){return '<li>'+escapeHtml(x)+'</li>';}).join("")+'</ul></div>';
    }
    day.items.forEach(function(it, ii){
      h += itemHtml(it, "d"+di+"-i"+ii);
    });
    h += '</div></div></section>';
    return h;
  }).join("");
  scheduleEl.innerHTML = dayHtml;

  // has any day.open by default? if today not in range, open day 0
  if(!TRIP.some(function(d){return d.date===today;})){
    var first = scheduleEl.querySelector(".day");
    if(first) first.classList.add("open");
  }

  // ---------- toggles: day open/close, tabs, day chips ----------
  document.addEventListener("click", function(e){
    var head = e.target.closest(".day-head");
    if(head){
      head.closest(".day").classList.toggle("open");
      return;
    }
    var chip = e.target.closest(".chip");
    if(chip){
      var di = chip.getAttribute("data-day");
      var sec = document.getElementById("day-"+di);
      sec.classList.add("open");
      switchView("schedule");
      sec.scrollIntoView({behavior: window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth", block:"start"});
      return;
    }
    var tab = e.target.closest(".tab");
    if(tab){
      switchView(tab.getAttribute("data-view"));
      return;
    }
    var seg = e.target.closest(".seg button");
    if(seg){
      var segGroup = seg.closest(".seg");
      segGroup.querySelectorAll("button").forEach(function(b){ b.classList.remove("active"); });
      seg.classList.add("active");
      if(segGroup.getAttribute("data-field") === "method"){
        var cardSeg = segGroup.parentElement.querySelector('.seg[data-field="card"]');
        cardSeg.hidden = seg.getAttribute("data-value") !== "카드";
      }
      return;
    }
    var del = e.target.closest(".del");
    if(del){
      var type = del.getAttribute("data-type");
      var id = del.getAttribute("data-id");
      var idx = Number(del.getAttribute("data-idx"));
      if(type === "note"){ state.notes[id].splice(idx,1); }
      else{ state.expenses[id].splice(idx,1); }
      saveState();
      refreshExtras(id);
      renderSettle();
      showToast("삭제됨");
      return;
    }
  });

  function switchView(view){
    document.querySelectorAll(".tab").forEach(function(t){ t.classList.toggle("active", t.getAttribute("data-view")===view); });
    document.getElementById("scheduleView").classList.toggle("hidden", view!=="schedule");
    document.getElementById("settleView").classList.toggle("active", view==="settle");
    if(view==="settle") renderSettle();
  }

  // ---------- forms: add note / add expense ----------
  document.addEventListener("submit", function(e){
    var noteForm = e.target.closest("[data-note-form]");
    if(noteForm){
      e.preventDefault();
      var id = noteForm.getAttribute("data-note-form");
      var timeVal = noteForm.querySelector(".n-time").value.trim();
      var textVal = noteForm.querySelector(".n-text").value.trim();
      var urlVal = noteForm.querySelector(".n-url").value.trim();
      if(!textVal) return;
      state.notes[id] = state.notes[id] || [];
      state.notes[id].push({ time:timeVal, text:textVal, url:urlVal });
      saveState();
      noteForm.reset();
      refreshExtras(id);
      showToast("메모 저장됨");
      return;
    }
    var expForm = e.target.closest("[data-exp-form]");
    if(expForm){
      e.preventDefault();
      var id2 = expForm.getAttribute("data-exp-form");
      var method = expForm.querySelector('.seg[data-field="method"] button.active').getAttribute("data-value");
      var card = null;
      if(method === "카드"){
        card = expForm.querySelector('.seg[data-field="card"] button.active').getAttribute("data-value");
      }
      var amount = Number(expForm.querySelector(".e-amount").value);
      var currency = expForm.querySelector(".e-currency").value;
      var memo = expForm.querySelector(".e-memo").value.trim();
      if(!amount) return;
      state.expenses[id2] = state.expenses[id2] || [];
      state.expenses[id2].push({ method:method, card:card, amount:amount, currency:currency, memo:memo });
      saveState();
      expForm.reset();
      expForm.querySelectorAll(".seg button").forEach(function(b,i){ b.classList.toggle("active", i===0); });
      expForm.querySelector('.seg[data-field="card"]').hidden = true;
      refreshExtras(id2);
      showToast("지출 저장됨");
      return;
    }
  });

  function methodPill(entry){
    if(entry.method === "현금") return '<span class="pill-row pill-cash">현금</span>';
    if(entry.card === "교카드") return '<span class="pill-row pill-blue">교카드</span>';
    return '<span class="pill-row pill-plum">징카드</span>';
  }
  function currencySymbol(c){ return c === "KRW" ? "원" : "Rp"; }

  function refreshExtras(id){
    var noteListEl = document.querySelector('[data-note-list="'+id+'"]');
    var notes = state.notes[id] || [];
    if(noteListEl){
      noteListEl.innerHTML = notes.map(function(n, i){
        return '<li class="mini-item"><div class="m-body">'+(n.time?'<span class="m-time">'+escapeHtml(n.time)+'</span>':'')+escapeHtml(n.text)+
          (n.url?'<br><a href="'+escapeHtml(n.url)+'" target="_blank" rel="noopener">'+escapeHtml(n.url)+' ↗</a>':'')+
          '</div><button class="del" data-type="note" data-id="'+id+'" data-idx="'+i+'" aria-label="삭제">×</button></li>';
      }).join("");
    }
    var noteCountEl = document.querySelector('[data-note-count="'+id+'"]');
    if(noteCountEl) noteCountEl.textContent = notes.length ? notes.length : "0";

    var expListEl = document.querySelector('[data-exp-list="'+id+'"]');
    var exps = state.expenses[id] || [];
    if(expListEl){
      expListEl.innerHTML = exps.map(function(x, i){
        return '<li class="mini-item"><div class="m-body">'+methodPill(x)+'<span class="mono">'+fmtNum(x.amount)+' '+currencySymbol(x.currency)+'</span>'+
          (x.memo?' · '+escapeHtml(x.memo):'')+
          '</div><button class="del" data-type="expense" data-id="'+id+'" data-idx="'+i+'" aria-label="삭제">×</button></li>';
      }).join("");
    }
    var expSumEl = document.querySelector('[data-exp-sum="'+id+'"]');
    if(expSumEl){
      if(!exps.length){ expSumEl.textContent = "-"; }
      else{
        var byCur = {};
        exps.forEach(function(x){ byCur[x.currency] = (byCur[x.currency]||0) + Number(x.amount); });
        expSumEl.textContent = Object.keys(byCur).map(function(c){ return fmtNum(byCur[c])+currencySymbol(c); }).join(" · ");
      }
    }
  }

  // initial paint of all item extras
  TRIP.forEach(function(day, di){
    day.items.forEach(function(it, ii){ refreshExtras("d"+di+"-i"+ii); });
  });

  // ---------- settlement view ----------
  function renderSettle(){
    var totalEl = document.getElementById("settleTotal");
    var listEl = document.getElementById("settleList");

    var groups = { "현금":{}, "교카드":{}, "징카드":{} };
    var grand = {};
    var flat = [];

    TRIP.forEach(function(day, di){
      day.items.forEach(function(it, ii){
        var id = "d"+di+"-i"+ii;
        (state.expenses[id]||[]).forEach(function(x, xi){
          var key = x.method === "현금" ? "현금" : x.card;
          groups[key][x.currency] = (groups[key][x.currency]||0) + Number(x.amount);
          grand[x.currency] = (grand[x.currency]||0) + Number(x.amount);
          flat.push({ day:shortDate(day.date), dow:day.dow, title:it.title, id:id, idx:xi, entry:x });
        });
      });
    });

    function rowHtml(label, pillClass, sums){
      var keys = Object.keys(sums);
      var vals = keys.length ? keys.map(function(c){ return '<div>'+fmtNum(sums[c])+' '+currencySymbol(c)+'</div>'; }).join("") : '<div>0</div>';
      return '<div class="settle-row"><span class="label"><span class="pill-row '+pillClass+'">'+label+'</span></span><span class="vals">'+vals+'</span></div>';
    }

    var html = '<h2>정산 요약</h2>';
    html += rowHtml("현금", "pill-cash", groups["현금"]);
    html += rowHtml("교카드", "pill-blue", groups["교카드"]);
    html += rowHtml("징카드", "pill-plum", groups["징카드"]);
    var grandKeys = Object.keys(grand);
    html += '<div class="settle-row grand"><span class="label">전체 합계</span><span class="vals">'+
      (grandKeys.length ? grandKeys.map(function(c){ return '<div>'+fmtNum(grand[c])+' '+currencySymbol(c)+'</div>'; }).join("") : '<div>0</div>')+
      '</span></div>';
    totalEl.innerHTML = html;

    if(!flat.length){
      listEl.innerHTML = '<div class="settle-empty">아직 등록된 지출이 없어요. 일정에서 항목을 열고 지출을 추가해 보세요.</div>';
      return;
    }
    listEl.innerHTML = '<h2>전체 내역</h2>' + flat.map(function(f){
      return '<div class="settle-item"><span class="si-day mono">'+f.day+'('+f.dow+')</span>'+
        '<span class="si-title">'+escapeHtml(f.title)+(f.entry.memo?' · '+escapeHtml(f.entry.memo):'')+'</span>'+
        '<span class="si-amt">'+fmtNum(f.entry.amount)+currencySymbol(f.entry.currency)+'</span>'+
        '<button class="del" data-type="expense" data-id="'+f.id+'" data-idx="'+f.idx+'" aria-label="삭제">×</button></div>';
    }).join("");
  }

  // ---------- toast ----------
  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1300);
  }

  // scroll today's section into view on first load (if trip is live)
  var todaySec = TRIP.some(function(d){return d.date===today;}) ? document.getElementById("day-"+TRIP.findIndex(function(d){return d.date===today;})) : null;
  if(todaySec){
    setTimeout(function(){ todaySec.scrollIntoView({behavior:"auto", block:"start"}); }, 0);
  }
})();
</script>
